site_name: PowerShell Command Encyclopedia
site_description: >-
  The complete reference for PowerShell commands, scripting, and custom command
  authoring — from beginner to advanced.
site_url: https://ruthie-frc.github.io/Powershell-Commands/
repo_url: https://github.com/Ruthie-FRC/Powershell-Commands
repo_name: Ruthie-FRC/Powershell-Commands
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/console
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - toc.follow

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ruthie-FRC/Powershell-Commands
      name: Source code on GitHub
    - icon: octicons/issue-opened-16
      link: https://github.com/Ruthie-FRC/Powershell-Commands/issues
      name: Open an issue or suggestion
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: Thanks for your feedback!

copyright: >-
  Copyright &copy; 2025 Ruthie-FRC &mdash;
  <a href="https://github.com/Ruthie-FRC/Powershell-Commands/issues">suggest a change or report an issue</a>

nav:
  - Home: index.md
  - Getting Started:
      - What is PowerShell?: getting-started/what-is-powershell.md
      - Installation: getting-started/installation.md
      - Your First Commands: getting-started/first-commands.md
      - The Pipeline: getting-started/the-pipeline.md
  - Core Concepts:
      - Variables & Scope: concepts/variables.md
      - Data Types: concepts/data-types.md
      - Operators: concepts/operators.md
      - Control Flow: concepts/control-flow.md
      - Functions: concepts/functions.md
      - Error Handling: concepts/error-handling.md
      - Modules: concepts/modules.md
      - Providers & Drives: concepts/providers.md
      - Profiles: concepts/profiles.md
  - Guides:
      - File System: guides/filesystem.md
      - Processes: guides/processes.md
      - Networking: guides/networking.md
      - System Information: guides/system.md
      - Pipelines & Filtering: guides/pipelines.md
      - Users & Security: guides/users-and-security.md
      - Registry: guides/registry.md
      - Scheduled Tasks: guides/scheduled-tasks.md
      - Remote Management: guides/remote-management.md
  - Writing Your Own Commands:
      - Creating Functions: authoring/functions.md
      - Advanced Functions: authoring/advanced-functions.md
      - Script Modules: authoring/script-modules.md
      - Comment-Based Help: authoring/comment-based-help.md
      - Publishing to PSGallery: authoring/psgallery.md
  - Command Reference: command-reference.md
  - Examples & Recipes: examples.md
  - Contributing: contributing.md
